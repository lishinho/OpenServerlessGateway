apiVersion: apps/v1
kind: Deployment
metadata:
  name: osg-gateway
  labels:
    app: osg-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: osg-gateway
  template:
    metadata:
      labels:
        app: osg-gateway
        version: v1
    spec:
      containers:
      - name: osg-gateway
        image: osg/gateway:1.0.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: JAVA_OPTS
          value: "-Xms512m -Xmx1024m -XX:+UseG1GC"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: osg-gateway
  labels:
    app: osg-gateway
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: osg-gateway
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: osg-gateway-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: osg.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: osg-gateway
            port:
              number: 8080
